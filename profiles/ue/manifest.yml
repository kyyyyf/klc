name: ue
summary: Unreal Engine projects (uproject + plugins, Build.cs modules, .uasset content).

# Paths are relative to the repo root.
rules:
  - core/rules/cpp
  - core/rules/python
  - core/rules/typescript
  - core/rules/rust
  - profiles/ue/rules/cpp-unreal

# ast-grep config with UE language overrides (.h -> cpp).
sgconfig: profiles/ue/sgconfig.yml

# Review sub-agents active for this profile. Core ones run always; profile
# ones run on matching diffs (see agents/review/*.md for triggers).
reviewers:
  # UE-profile reviewers replace the generic ones where a richer UE
  # checklist exists. `test-coverage` stays generic (tests are tests).
  #
  # `filter` is an optional regex over file paths. review.sh produces a
  # per-reviewer diff containing only matching files. Omit `filter` to
  # feed the reviewer the full diff (e.g. security — needs full context).
  always:
    - path: profiles/ue/agents/review/security.md
      # no filter: security needs the whole diff
    - path: profiles/ue/agents/review/architecture.md
      filter: '\.(h|hpp|cpp|cc|Build\.cs|Target\.cs)$|modules\.json$'
    - path: profiles/ue/agents/review/performance.md
      filter: '\.(h|hpp|cpp|cc)$'
    - path: core/agents/review/test-coverage.md
      filter: '(^|/)(Tests?|__tests__|test)/|_test\.|\.test\.|Test\.cpp$|Test\.h$'
    - path: profiles/ue/agents/review/ue-conventions.md
      filter: '\.(h|hpp|cpp|cc|uproject|uplugin|Build\.cs|Target\.cs|ini)$'
  conditional:
    - path: profiles/ue/agents/review/replication.md
      trigger: 'DOREPLIFETIME|UFUNCTION\(\s*Server|UFUNCTION\(\s*Client|UFUNCTION\(\s*NetMulticast|_Implementation\(|_Validate\(|bReplicates|ReplicatedUsing|COND_|GetLifetimeReplicatedProps'
      filter: '\.(h|hpp|cpp|cc)$'
    - path: profiles/ue/agents/review/content-pipeline.md
      trigger: 'TSoftObjectPtr|TSoftClassPtr|FSoftObjectPath|FAssetData|UDataTable|UPrimaryDataAsset|UAssetManager|\.uasset|\.umap|DirectoriesToAlwaysCook|AssetManagerClassName'
      filter: '\.(uasset|umap|ini|h|hpp|cpp)$'

# File-system paths never scanned.
excludes:
  - Binaries
  - Intermediate
  - Saved
  - DerivedDataCache
  - Content
  - Platforms
  - ThirdParty

# "Large" threshold. Bootstrap (inventory/decompose/docgen) stays
# deterministic regardless of size — Serena never runs during init.
# Ticket-time agents (task/test/review) treat this number as an
# advisory: at-or-above the threshold, Serena becomes the preferred
# way to verify a signature during design/impl/build on M/L tracks;
# below, ast-grep over the profile rule set is usually enough.
large_project_threshold_files: 500

# Module discovery. For UE this is "one module per *.Build.cs".
module_discovery:
  mode: build-cs            # special-cased in core/skills/file-scanner.sh
  entry_patterns:
    - "*.uproject"
    - "*.uplugin"

# What counts as "content" for validator/task/review (bug layer = content).
content_extensions:
  - .uasset
  - .umap

# Profile hooks (optional). All receive <files-list-file> + <out-json-file>.
hooks:
  # Validates non-code artefacts changed by the diff. Reviewer content-pipeline
  # consumes the findings and turns them into [SEVERITY] issues.
  validate_assets: profiles/ue/hooks/validate-cbp.sh
