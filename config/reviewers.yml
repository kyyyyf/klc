# Reviewer configuration for the Codebase Intelligence Framework.
#
# Consumed by:
#   - core/skills/review.py (orchestrates reviewer agents)
#
# Controls the multi-agent code-review pipeline, the mutation-score gate for
# the test agent, and the optional external reviewer.
#
# When adding new keys here, ensure external-review.md and review.md honour
# the defaults they list. Do not commit secrets to this file; API keys are
# read from the environment variable named in api_key_env.

external_reviewer:
  # Default-on for S/M/L tickets. Opt out with --no-external flag or
  # meta.review.skip_external: true. Skipped automatically when api_key_env
  # is unset (graceful degradation). XS never reaches the external reviewer.
  enabled:      true
  min_track:    S                 # XS skips external regardless of enabled
  provider:     openai            # openai | anthropic | google | ollama
  model:        gpt-4o
  api_key_env:  OPENAI_API_KEY
  focus:
    - security
    - architecture
    - performance
    - readability
    - test_coverage
  output_format: markdown
  report_path:   .klc/reports/external-review-{timestamp}.md

test:
  # Minimum mutation score (percent). The test agent iterates up to three
  # times to reach this threshold before proceeding.
  mutation_score_threshold: 80

  # Per-language overrides of the mutation gate. Use this for languages or
  # build systems where the mutation tool is impractical (e.g. cpp-unreal
  # under UnrealBuildTool). Keys match the `language` field that the test
  # agent writes into .klc/index/test-framework.json.
  per_language:
    cpp-unreal:
      mutation_enabled: false
      reason: "UBT + mull are not compatible; mutation testing is skipped for UE projects."

review:
  # Severity levels that block merge. Anything in this list contributes to
  # ISSUES_BLOCKING counters returned by each sub-agent.
  blocking_severity:
    - CRITICAL
    - HIGH
  # Whether to launch the five internal sub-agents concurrently.
  parallel_subagents: true

cascade:
  # When enabled, review_cascade.py runs scope_delta + scan_sentinels +
  # classify_tier before launching sub-agents. Peripheral diffs with no
  # sentinel hits and no scope drift get a single cheap reviewer (Sonnet)
  # instead of the full multi-agent pipeline.
  enabled: true

  # Maximum number of peripheral files before falling back to full review.
  # Keeps cheap-review fast; very large peripheral diffs are unusual enough
  # to warrant a second look.
  peripheral_max_files: 20

  # Maximum total added+removed lines across all peripheral files.
  # A mechanically large diff (e.g. mass rename) warrants a full review
  # even if every individual file is peripheral.
  # Default: 500 lines (added + removed combined).
  peripheral_max_lines: 500

reports:
  # Retention policy for .klc/reports/. Older runs are pruned at the
  # start of each review.sh invocation.
  retention_runs: 30          # keep the 30 most recent review-*.md files
  retention_partials_days: 7  # delete partials-*/pending-* older than N days
