# profile.yml — active profile selection
#
# Consumed by:
#   - core/phases/install.py (seeds during project init)
#   - core/phases/doctor.py (validates profile config)
#   - core/skills/profile-resolve.py (resolves active profile)
#
# Per-project override: .klc/config/profile.yml takes precedence over
# this framework default.
#
# Contract: the only valid key is `profile`. Language detection is
# inventory-based (detect_languages.py reads .klc/index/inventory.json).
# Do NOT add a `languages` key here — it will be flagged by klc doctor.

profile: ue
